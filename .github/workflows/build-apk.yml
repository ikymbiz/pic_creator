name: Build APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App display name'
        required: false
        type: string
        default: 'My App'
      app_id:
        description: 'Application ID (package name)'
        required: false
        type: string
        default: 'com.example.app'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Locate MainActivity.kt in repository
        id: locate_kt
        run: |
          set -e
          KT_PATH=$(find . -type f -name 'MainActivity.kt' ! -path './.git/*' ! -path './build/*' ! -path './.gradle/*' | head -n 1)
          if [ -z "$KT_PATH" ]; then
            echo "::error::MainActivity.kt がリポジトリに見つかりません。IDEの 🤖 ボタンで Kotlin 翻訳を実行してからデプロイしてください。"
            exit 1
          fi
          echo "Found MainActivity.kt at: $KT_PATH"
          echo "kt_path=$KT_PATH" >> "$GITHUB_OUTPUT"

      - name: Generate Android project scaffold
        env:
          APP_NAME: ${{ inputs.app_name }}
          APP_ID: ${{ inputs.app_id }}
          KT_SOURCE: ${{ steps.locate_kt.outputs.kt_path }}
        run: |
          set -e
          PROJ=/tmp/androidproj
          mkdir -p "$PROJ"
          cd "$PROJ"

          # パッケージディレクトリ
          PKG_DIR=$(echo "$APP_ID" | tr '.' '/')
          mkdir -p "app/src/main/java/$PKG_DIR"
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-anydpi-v26

          # MainActivity.kt をコピー（パッケージ宣言を書き換え）
          SRC_KT="$GITHUB_WORKSPACE/$KT_SOURCE"
          DEST_KT="app/src/main/java/$PKG_DIR/MainActivity.kt"
          # 既存の package 宣言を置換、なければ先頭に追加
          if head -n 1 "$SRC_KT" | grep -q '^package '; then
            sed "1s|^package .*|package $APP_ID|" "$SRC_KT" > "$DEST_KT"
          else
            echo "package $APP_ID" > "$DEST_KT"
            echo "" >> "$DEST_KT"
            cat "$SRC_KT" >> "$DEST_KT"
          fi
          echo "=== MainActivity.kt (head) ==="
          head -n 20 "$DEST_KT"

          # settings.gradle
          cat > settings.gradle <<'SETTINGS'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "GeneratedApp"
          include ':app'
          SETTINGS

          # build.gradle (root)
          cat > build.gradle <<'ROOTGRADLE'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
          }
          ROOTGRADLE

          # app/build.gradle
          cat > app/build.gradle <<APPGRADLE
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }

          android {
              namespace '$APP_ID'
              compileSdk 34

              defaultConfig {
                  applicationId "$APP_ID"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                  }
                  debug {
                      minifyEnabled false
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = '17'
              }
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
              implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'
          }
          APPGRADLE

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml <<'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:theme="@style/Theme.App"
                  android:supportsRtl="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          MANIFEST

          # strings.xml
          cat > app/src/main/res/values/strings.xml <<STRINGS
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">$APP_NAME</string>
          </resources>
          STRINGS

          # themes.xml
          cat > app/src/main/res/values/themes.xml <<'THEMES'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.App" parent="Theme.Material3.DayNight.NoActionBar" />
          </resources>
          THEMES

          # gradle.properties
          cat > gradle.properties <<'GRADLEPROPS'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          kotlin.code.style=official
          android.nonTransitiveRClass=true
          GRADLEPROPS

          echo "=== Generated project structure ==="
          find . -type f | sort

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        working-directory: /tmp/androidproj
        run: |
          gradle wrapper --gradle-version 8.5
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: /tmp/androidproj/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
