name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract source zip
        run: |
          ZIP_FILE=$(ls SilentCamera*.zip 2>/dev/null | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "Error: SilentCamera*.zip not found in repo root"
            exit 1
          fi
          echo "Extracting: $ZIP_FILE"
          unzip -o "$ZIP_FILE" -d build_workspace/
          PROJECT_DIR=$(find build_workspace -type d -name app | head -n 1 | xargs dirname)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Project root: $PROJECT_DIR"

      - name: Generate root Gradle files
        run: |
          cd "$PROJECT_DIR"

          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = 'SilentCamera'
          include ':app'
          EOF

          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.1.4' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.10' apply false
          }
          EOF

          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          kotlin.code.style=official
          EOF

      - name: Install ImageMagick
        run: |
          sudo apt-get install -y -qq imagemagick \
            || (sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick)
          which convert && convert -version | head -n 1

      - name: Generate launcher icons
        run: |
          cd "$PROJECT_DIR"
          # 各密度のアイコン生成（黒背景に白いリング = カメラレンズ風）
          for spec in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            density="${spec%:*}"
            size="${spec#*:}"
            DIR="app/src/main/res/mipmap-$density"
            mkdir -p "$DIR"
            half=$((size/2))
            outer=$((size*2/5))
            inner=$((size/5))
            convert -size ${size}x${size} xc:"#000000" \
              -fill "#FFFFFF" -draw "circle $half,$half $((half+outer)),$half" \
              -fill "#000000" -draw "circle $half,$half $((half+inner)),$half" \
              "$DIR/ic_launcher.png"
            echo "Generated: $DIR/ic_launcher.png ($size x $size)"
          done

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build debug APK
        run: |
          cd "$PROJECT_DIR"
          gradle assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SilentCamera-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
          retention-days: 30
